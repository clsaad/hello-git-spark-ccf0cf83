<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comece agora — Inetweb</title>
  <meta name="description" content="Escolha um produto Inetweb e cadastre seus dados para entrarmos em contato." />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand"><img src="assets/inetweb-logo.png" alt="Inetweb" /></a>
      <a href="index.html" class="btn btn-ghost">← Voltar</a>
    </div>
  </header>

  <section class="hero hero-sm">
    <div class="container hero-inner">
      <h1>Comece agora</h1>
      <p>Escolha um dos nossos produtos e preencha seus dados. Entraremos em contato.</p>
    </div>
  </section>

  <section class="section">
    <form id="signup-form" class="signup container" action="api/signup.php" method="post" novalidate>
      <div>
        <h2>1. Selecione o produto</h2>
        <p class="muted">Escolha qual solução você quer contratar.</p>
        <div class="grid grid-2 product-grid" role="radiogroup" aria-label="Produtos">
          <label class="product-card">
            <input type="radio" name="produto" value="cloud-computing" required />
            <div class="product-body">
              <span class="product-icon">☁️</span>
              <div>
                <h3>Cloud Computing</h3>
                <p>Infraestrutura em nuvem escalável e sob demanda.</p>
              </div>
            </div>
          </label>
          <label class="product-card">
            <input type="radio" name="produto" value="hospedagem" />
            <div class="product-body">
              <span class="product-icon">🖥️</span>
              <div>
                <h3>Hospedagem de Sites</h3>
                <p>Hospedagem rápida, segura e com alta disponibilidade.</p>
              </div>
            </div>
          </label>
          <label class="product-card">
            <input type="radio" name="produto" value="email" />
            <div class="product-body">
              <span class="product-icon">✉️</span>
              <div>
                <h3>E-mail Profissional</h3>
                <p>Contas de e-mail com seu domínio, antispam e webmail.</p>
              </div>
            </div>
          </label>
          <label class="product-card">
            <input type="radio" name="produto" value="backup" />
            <div class="product-body">
              <span class="product-icon">💾</span>
              <div>
                <h3>Cloud Backup</h3>
                <p>Backups automáticos e criptografados na nuvem.</p>
              </div>
            </div>
          </label>
        </div>
        <small class="error" data-for="produto"></small>
      </div>

      <div>
        <h2>2. Seus dados</h2>
        <p class="muted">Preencha o formulário para concluir.</p>
        <div class="grid grid-2 form-card">
          <div class="field">
            <label for="nome">Nome</label>
            <input id="nome" name="nome" maxlength="100" required />
            <small class="error" data-for="nome"></small>
          </div>
          <div class="field">
            <label for="empresa">Empresa</label>
            <input id="empresa" name="empresa" maxlength="120" required />
            <small class="error" data-for="empresa"></small>
          </div>
          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" maxlength="255" required />
            <small class="error" data-for="email"></small>
          </div>
          <div class="field">
            <label for="telefone">Telefone</label>
            <input id="telefone" name="telefone" type="tel" maxlength="20" required />
            <small class="error" data-for="telefone"></small>
          </div>
        </div>
      </div>

      <input type="text" name="website" class="hp" tabindex="-1" autocomplete="off" />

      <div class="actions">
        <a href="index.html" class="btn btn-outline">Cancelar</a>
        <button type="submit" class="btn btn-secondary btn-lg">Enviar cadastro</button>
      </div>
      <p class="form-note" id="form-status"></p>
    </form>
  </section>

  <script src="assets/script.js"></script>
</body>
</html>
